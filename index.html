<style>
/* CSS ORIGINAL MANTIDO */
body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; background-image: radial-gradient(circle at top, #2b1810 0%, #121212 100%); min-height: 100vh; }
header { background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://comandogeek.com.br/blog/wp-content/uploads/2025/01/Design-sem-nome-2025-01-21T133034.785-1-1024x536.png'); background-size: cover; background-position: center; padding: 60px 20px; text-align: center; border-bottom: 4px solid #ff0800; }
header h1 { margin: 0; font-size: 3.5rem; text-transform: uppercase; color: #ff0000; text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }

.container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
.section-title { font-size: 2rem; color: #ff0800; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 50px; text-transform: uppercase; text-align: center; }

/* ÁREA DE UPLOAD */
.upload-section { background-color: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px dashed #ff0800; margin-bottom: 40px; text-align: center; }
.upload-section input[type="text"] { padding: 12px; margin: 10px; border-radius: 5px; border: 1px solid #444; background: #121212; color: white; width: 250px; }
.upload-section button { padding: 12px 25px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
.upload-section button:disabled { background: #555; cursor: not-allowed; }

/* GRID E CARDS */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
.card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
.card:hover { transform: translateY(-5px); border-color: #ff0800; }
.img-container { height: 220px; background-color: #000; display: flex; justify-content: center; align-items: center; padding: 15px; }
.img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
.info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
.info h3 { margin: 0 0 15px 0; color: #ff0000; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }

/* BOTÕES */
.btn-copy { width: 100%; padding: 12px; background: linear-gradient(90deg, #ff0000, #e60000); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
.variants-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.variant-btn { flex: 1 1 calc(50% - 4px); background: #2a2a2a; color: #ccc; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
.variant-btn.active { background: #ff1e00; color: white; border-color: #ff0000; }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0000; color: white; padding: 15px 30px; border-radius: 30px; display: none; z-index: 1000; }

// DADOS DA COMUNIDADE
let dbComunidade = JSON.parse(localStorage.getItem('tattoos_user')) || [];

function renderizarGrid(data, elementId, isUser = false) {
    const grid = document.getElementById(elementId);
    grid.innerHTML = '';
    
    data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        let currentLink = item.variants[0].link;
        
        card.innerHTML = `
            <div class="img-container"><img src="${currentLink}" id="img-${elementId}-${index}"></div>
            <div class="info">
                <h3>${item.name}</h3>
                <button class="btn-copy" onclick="copiar('${currentLink}')">Copiar Link</button>
                <div class="variants-grid" id="vars-${elementId}-${index}"></div>
            </div>
        `;
        
        grid.appendChild(card);

        // Adiciona variações se existirem
        if (item.variants.length > 1) {
            const varsContainer = document.getElementById(`vars-${elementId}-${index}`);
            item.variants.forEach((v, vIdx) => {
                const b = document.createElement('button');
                b.className = 'variant-btn' + (vIdx === 0 ? ' active' : '');
                b.innerText = v.name;
                b.onclick = () => {
                    document.getElementById(`img-${elementId}-${index}`).src = v.link;
                    currentLink = v.link;
                    varsContainer.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
                    b.classList.add('active');
                };
                varsContainer.appendChild(b);
            });
        }
    });
}

// FUNÇÃO DE UPLOAD (ImgBB)
 async function fazerUpload() {
    const fileInput = document.getElementById('fileInput');
    const userName = document.getElementById('userName').value;
    const status = document.getElementById('status');
    const btn = document.getElementById('uploadBtn');

    if (!fileInput.files[0] || !userName) {
        alert("Por favor, selecione uma foto e digite um nome!");
        return;
    }

    status.innerText = "Enviando para o servidor... aguarde...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append("image", fileInput.files[0]);

    try {
        // Esta é a API pública do ImgBB
        const response = await fetch("https://api.imgbb.com/1/upload?key=67f6770518349479b18868c2a39a4866", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (data.success) {
            const novoLink = data.data.url; // AQUI ESTÁ O SEU LINK REAL
            
            // Salva no banco local
            const novaTattoo = { name: userName, variants: [{ name: "Padrão", link: novoLink }] };
            dbComunidade.push(novaTattoo);
            localStorage.setItem('tattoos_user', JSON.stringify(dbComunidade));

            status.innerText = "Sucesso! Link gerado.";
            renderizarGrid(dbComunidade, 'comunidadeGrid', true);
            
            // Limpa
            fileInput.value = "";
            document.getElementById('userName').value = "";
        } else {
            throw new Error("Falha no upload");
        }
    } catch (error) {
        status.innerText = "Erro: Suba o site para o GitHub para funcionar.";
        console.error(error);
    } finally {
        btn.disabled = false;
    }
}
function copiar(txt) {
    navigator.clipboard.writeText(txt);
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

// Iniciar

renderizarGrid(dbComunidade, 'comunidadeGrid', true);
