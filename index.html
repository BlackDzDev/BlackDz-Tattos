// FUNÇÃO PARA RENDERIZAR GRIDS
function renderizar(data, containerId) {
    const grid = document.getElementById(containerId);
    grid.innerHTML = '';
    data.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        let currentLink = item.variants[0].link;
        card.innerHTML = `
            <div class="img-container"><img src="${currentLink}" id="img-${containerId}-${idx}"></div>
            <div class="info">
                <h3>${item.name}</h3>
                <button class="btn-copy" onclick="copy('${currentLink}')">Copiar Link</button>
                <div id="vars-${containerId}-${idx}"></div>
            </div>
        `;
        grid.appendChild(card);
        if(item.variants.length > 1) {
            item.variants.forEach(v => {
                const b = document.createElement('button');
                b.className = 'variant-btn';
                b.innerText = v.name;
                b.onclick = () => {
                    document.getElementById(`img-${containerId}-${idx}`).src = v.link;
                    currentLink = v.link;
                };
                document.getElementById(`vars-${containerId}-${idx}`).appendChild(b);
            });
        }
    });
}

// BUSCAR DADOS DO SUPABASE
async function fazerUpload() {
    const fileInput = document.getElementById('fileInput');
    const name = document.getElementById('userName').value;
    const status = document.getElementById('status');
    const btn = document.getElementById('uploadBtn');

    if (!fileInput.files[0] || !name) return alert("Escolha uma foto e dê um nome!");

    btn.disabled = true;
    status.innerText = "A ligar ao servidor...";

    const formData = new FormData();
    formData.append("image", fileInput.files[0]);

    try {
        // Passo 1: Upload para o ImgBB (Usando uma chave de backup)
        const resImg = await fetch("https://api.imgbb.com/1/upload?key=67f6770518349479b18868c2a39a4866", {
            method: "POST",
            body: formData
        });
        const dataImg = await resImg.json();

        if (!dataImg.success) throw new Error("Erro no ImgBB");

        status.innerText = "A guardar no banco de dados...";

        // Passo 2: Salvar no seu Supabase
        const resDb = await fetch(`${SB_URL}/rest/v1/tattoos`, {
            method: "POST",
            headers: {
                "apikey": SB_KEY,
                "Authorization": `Bearer ${SB_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=minimal"
            },
            body: JSON.stringify({ name: name, link: dataImg.data.url })
        });

        if (resDb.ok) {
            status.style.color = "#00ff00";
            status.innerText = "Sucesso! Tattoo publicada.";
            setTimeout(() => location.reload(), 1500);
        } else {
            status.innerText = "Erro: Verifique se desativou o RLS no Supabase.";
        }
    } catch (error) {
        status.innerText = "Erro na conexão. Tente outra imagem.";
        console.error(error);
    } finally {
        btn.disabled = false;
    }
}

function copy(t) {
    navigator.clipboard.writeText(t);
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
}
