body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121212;
    color: #fff;
    background-image: radial-gradient(circle at top, #2b1810 0%, #121212 100%);
    min-height: 100vh;
}

header {
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://comandogeek.com.br/blog/wp-content/uploads/2025/01/Design-sem-nome-2025-01-21T133034.785-1-1024x536.png');
    background-size: cover;
    background-position: center;
    background-blend-mode: overlay;
    padding: 60px 20px;
    text-align: center;
    border-bottom: 4px solid #ff0800;
    box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
}

header h1 {
    margin: 0;
    font-size: 3.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #ff0000;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 20px rgba(255, 0, 0, 0.5);
}

header p {
    font-size: 1.2rem;
    color: #ccc;
    margin-top: 10px;
    letter-spacing: 1px;
}

.container {
    max-width: 1400px;
    margin: 40px auto;
    padding: 0 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
}

.card {
    background-color: #1e1e1e;
    border: 1px solid #333;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #ff0800;
    box-shadow: 0 8px 20px rgba(255, 0, 0, 0.2);
}

.img-container {
    height: 220px;
    background-color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
    position: relative;
}

.img-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.3s ease;
}

.info {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.info h3 {
    margin: 0 0 15px 0;
    font-size: 1.3rem;
    color: #ff0000;
    text-transform: uppercase;
    text-align: center;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

.btn-copy {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #ff0000, #e60000);
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: filter 0.2s, transform 0.1s;
    margin-bottom: 15px;
}

.btn-copy:hover {
    filter: brightness(1.2);
}

.btn-copy:active {
    transform: scale(0.98);
}

.variants-title {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.variants-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.variant-btn {
    flex: 1 1 calc(50% - 4px);
    background-color: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    padding: 8px 5px;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}

.variant-btn:hover, .variant-btn.active {
    background-color: #ff1e00;
    color: white;
    border-color: #ff0000;
}

#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #ff0000;
    color: white;
    padding: 15px 30px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1.1rem;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(255, 0, 0, 0.5);
}

#toast.show {
    opacity: 1;
    transform: translate(-50%, -10px);
}
</style>

        item.variants.forEach((v, vIndex) => {
            const vBtn = document.createElement('button');
            vBtn.className = 'variant-btn';
            if(vIndex === 0) vBtn.classList.add('active'); 
            vBtn.innerText = v.name;
            
            vBtn.onclick = () => {

                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = v.link;
                    img.style.opacity = '1';
                }, 150);

                currentLink = v.link;
                btnCopy.onclick = () => copyText(currentLink);
                
                const allBtns = variantsGrid.querySelectorAll('.variant-btn');
                allBtns.forEach(b => b.classList.remove('active'));
                vBtn.classList.add('active');
            };
            
            variantsGrid.appendChild(vBtn);
        });
        
        info.appendChild(variantsGrid);
    }
    
    card.appendChild(imgContainer);
    card.appendChild(info);
    grid.appendChild(card);
});

function copyText(text) {
    const tempInput = document.createElement('input');
    tempInput.value = text;
    document.body.appendChild(tempInput);
    tempInput.select();
    document.execCommand('copy');
    document.body.removeChild(tempInput);
    
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 2500);
}
</script>
</body>
</html>
